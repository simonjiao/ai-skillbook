name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check Markdown links
        run: python3 scripts/check_md_links.py
      - name: Check catalog freshness
        run: python3 scripts/generate_catalog.py --check
